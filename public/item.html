<div id="view-items" class="view-section active">
  <div class="layout">
    <div>
      <div class="card">
        <div class="sec-label">Select items &amp; quantity</div>
        <div style="margin-bottom:12px;position:relative">
          <input type="text" id="item-search" placeholder="Search items..." oninput="filterTable()"
            style="width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 11px 8px 32px;font-size:13px;font-family:'Inter',sans-serif;color:var(--text);background:var(--bg3);outline:none;transition:border-color .2s" />
          <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none">⌕</span>
        </div>
        <table class="itbl">
          <thead>
            <tr>
              <th style="width:35%">Item</th>
              <th class="c" style="width:15%">7 days</th>
              <th class="c" style="width:15%">15 days</th>
              <th class="c" style="width:15%">30 days</th>
              <th style="text-align:right;width:14%">Amount</th>
            </tr>
          </thead>
          <tbody id="itbody"></tbody>
        </table>
        <div class="total-row">
          <span class="total-lbl">Total</span>
          <span class="total-num" id="gtotal">RM 0.00</span>
        </div>
      </div>
    </div>
    <div class="layout-sidebar">
      <div class="card">
        <div class="sec-label">Your details</div>
        <div class="field"><label>In-game name</label><input id="fn" type="text" placeholder="Your in-game name" /></div>
        <div class="field"><label>Note</label><textarea id="fno" placeholder="Special requests..."></textarea></div>
        <button class="sbtn" id="sbtn" onclick="submitOrder()">Place order</button>
        <div class="hint" id="sumhint">Add quantity to place an order.</div>
      </div>
    </div>
  </div>
</div>

<!-- Payment Modal (item orders) -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">Payment</div>
    <div class="modal-amt" id="modal-amt-item">RM 0.00</div>
    <div style="display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 12px;margin-bottom:4px">
      <span style="font-family:'Rajdhani',sans-serif;font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase">Order ID</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="modal-order-id" style="font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;color:var(--text);letter-spacing:.04em">—</span>
        <button onclick="copyOrderId()" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:0;transition:color .15s" title="Copy order ID">⧉</button>
      </div>
    </div>
    <img class="modal-qr" src="https://lh3.googleusercontent.com/d/1rJPbucJNmQaR1cHU4CvI2AOMnp102GsM=w600" alt="Payment QR" />
    <hr class="modal-divider" />
    <div class="modal-sub">Upload payment screenshot</div>
    <div class="upload-area" id="upload-area">
      <input type="file" id="proof-file-item" accept="image/*,application/pdf" onchange="previewFileItem(this)" />
      <div class="upload-lbl">Tap to select screenshot or PDF<br><span>JPG / PNG / PDF supported</span></div>
      <img class="preview-img" id="preview-img-item" />
      <div id="preview-pdf-item" style="display:none;margin-top:10px;padding:10px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:12px;color:var(--accent);letter-spacing:.05em">📄 PDF selected — ready to upload</div>
    </div>
    <div class="upload-status" id="upload-status-item"></div>
    <button class="upload-btn" id="upload-btn-item" onclick="uploadProofItem()">Submit proof</button>
  </div>
</div>
